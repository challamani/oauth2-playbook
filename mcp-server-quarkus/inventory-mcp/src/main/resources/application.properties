quarkus.package.jar.type=uber-jar
quarkus.rest-client.follow-redirects=true

quarkus.log.file.enable=true
quarkus.log.file.path=inventory-quarkus.log

quarkus.http.port=8085

# Public OAuth metadata endpoint must stay unauthenticated.
quarkus.http.auth.permission.well-known.paths=/.well-known/*
quarkus.http.auth.permission.well-known.policy=permit
quarkus.http.auth.permission.mcp.paths=/mcp,/mcp/*
quarkus.http.auth.permission.mcp.policy=authenticated

quarkus.oidc.enabled=true
quarkus.oidc.auth-server-url=https://localhost:9443/realms/oauth2-playbook
quarkus.oidc.client-id=oauth2-playbook-mcp-agent
quarkus.oidc.tls.verification=none

quarkus.rest-client.inventory-api.url=http://localhost:9080
quarkus.rest-client.keycloak-token.url=https://localhost:9443/realms/oauth2-playbook/protocol/openid-connect
quarkus.rest-client.keycloak-token.verify-host=false
# Dev-only self-signed TLS: allow Keycloak HTTPS without importing certs.
quarkus.rest-client.keycloak-token.trust-all=true
quarkus.tls.trust-all=true

inventory.security.required-issuer=https://localhost:9443/realms/oauth2-playbook
inventory.security.required-audience=oauth2-playbook-mcp-agent

inventory.oauth.issuer=https://localhost:9443/realms/oauth2-playbook
inventory.oauth.authorization-endpoint=https://localhost:9443/realms/oauth2-playbook/protocol/openid-connect/auth
inventory.oauth.token-endpoint=https://localhost:9443/realms/oauth2-playbook/protocol/openid-connect/token
inventory.oauth.jwks-uri=https://localhost:9443/realms/oauth2-playbook/protocol/openid-connect/certs
# Public PKCE client-id that AI agents (Cline, Claude, Cursor) should use
inventory.oauth.agent-client-id=oauth2-playbook-mcp-agent

inventory.token-exchange.client-id=oauth2-playbook-mcp-inventory
inventory.token-exchange.client-secret=secret
# Tool scopes required on inbound MCP bearer token (agent -> MCP server)
inventory.security.tool-scope.events-read=mcp:events:read
inventory.security.tool-scope.tickets-read=mcp:tickets:read
inventory.security.tool-scope.reservations-write=mcp:reservations:write
# API scopes requested during token exchange (MCP server -> resource server)
inventory.token-exchange.scope.events-read=api:inventory:events:read
inventory.token-exchange.scope.tickets-read=api:inventory:tickets:read
inventory.token-exchange.scope.reservations-write=api:inventory:reservations:write
