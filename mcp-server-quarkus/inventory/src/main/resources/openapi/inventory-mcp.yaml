openapi: 3.1.0
info:
  title: Inventory MCP Contracts
  version: 1.0.0
  description: Request payload contract schemas used by MCP tools.
components:
  schemas:
    ListEventsRequest:
      type: object
      required:
        - city
      additionalProperties: false
      properties:
        city:
          type: string
          minLength: 1
          maxLength: 120
    TicketAvailabilityRequest:
      type: object
      required:
        - eventId
      additionalProperties: false
      properties:
        eventId:
          type: string
          minLength: 1
          maxLength: 80
    ReservationRequest:
      type: object
      required:
        - eventId
        - quantity
      additionalProperties: false
      properties:
        eventId:
          type: string
          minLength: 1
          maxLength: 80
        quantity:
          type: integer
          minimum: 1
          maximum: 10
