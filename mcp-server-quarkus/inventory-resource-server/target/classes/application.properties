quarkus.package.jar.type=uber-jar
quarkus.http.port=9080
quarkus.log.file.enable=true
quarkus.log.file.path=inventory-resource-server.log
quarkus.log.category."dev.mcpserver".level=DEBUG
# All /api/* endpoints require authentication
quarkus.http.auth.permission.secured.paths=/api/*
quarkus.http.auth.permission.secured.policy=authenticated
# OIDC / JWT validation
quarkus.oidc.enabled=true
quarkus.rest-client.keycloak-token.trust-all=true
quarkus.tls.trust-all=true
quarkus.oidc.auth-server-url=https://localhost:9443/realms/oauth2-playbook
quarkus.oidc.client-id=oauth2-playbook-inventory-resource-server
quarkus.oidc.tls.verification=none
# Validate audience matches this resource server's client-id
quarkus.oidc.token.audience=oauth2-playbook-inventory-resource-server
